<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
#map { width: 100%; height: 100vh; }

.kbtn {
  background: #fff;
  border: 2px solid #3396ff;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 700;
  color: #1a3a6b;
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  box-shadow: 0 3px 10px rgba(0,0,0,.15);
  cursor: pointer;
  white-space: nowrap;
  position: relative;
  transition: background .1s;
}
.kbtn:hover { background: #e8f0ff; }
.kbtn::after {
  content: '';
  position: absolute;
  bottom: -9px; left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: #3396ff;
}
</style>
</head>
<body>
<div id="map"></div>

<script>
// в”Җв”Җ Streamlit м»ҙнҸ¬л„ҢнҠё кіөмӢқ нҶөмӢ  мұ„л„җ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Streamlitмқҙ мқҙ iframeмқ„ лЎңл“ңн•ҳл©ҙ м•„лһҳ мқҙлІӨнҠёлҘј кё°лӢӨлҰј
// setComponentValue(value) нҳём¶ң вҶ’ Pythonмқҳ declare_component() л°ҳнҷҳк°’мңјлЎң м „лӢ¬
// вҶ’ st.rerun() нҠёлҰ¬кұ° м—ҶмқҙлҸ„ Pythonмқҙ к°’ мҲҳмӢ 

var Streamlit = {
  setComponentValue: function(value) {
    window.parent.postMessage({
      type: "streamlit:setComponentValue",
      value: value,
      dataType: "json"
    }, "*");
  },
  setFrameHeight: function(height) {
    window.parent.postMessage({
      type: "streamlit:setFrameHeight",
      height: height
    }, "*");
  }
};

// Streamlitм—җ м»ҙнҸ¬л„ҢнҠё мӨҖл№„ мҷ„лЈҢ м•ҢлҰј
window.parent.postMessage({ type: "streamlit:componentReady", apiVersion: 1 }, "*");

// Streamlitмқҙ Pythonм—җм„ң ліҙлӮҙлҠ” лҚ°мқҙн„° мҲҳмӢ  (мҙҲкё° pnu, lat, lng л“ұ)
var initData = null;
window.addEventListener("message", function(e) {
  if (e.data.type === "streamlit:render") {
    initData = e.data.args;
    initMap(initData);
  }
});
</script>

<script>
// в”Җв”Җ м№ҙм№ҙмҳӨл§ө SDK в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// APP_KEYлҠ” Pythonмқҙ render мқҙлІӨнҠёлЎң м „лӢ¬
var map, ov, MAP_KEY, VWORLD_KEY;

function initMap(args) {
  MAP_KEY     = args.map_key;
  VWORLD_KEY  = args.vworld_key;
  var lat     = args.lat     || 37.5668;
  var lng     = args.lng     || 126.9786;
  var pnu     = args.pnu     || "";

  // SDK лҸҷм Ғ лЎңл“ң
  var script = document.createElement("script");
  script.src = "https://dapi.kakao.com/v2/maps/sdk.js?appkey=" + MAP_KEY
             + "&libraries=services&autoload=false";
  script.onload = function() {
    kakao.maps.load(function() {
      map = new kakao.maps.Map(document.getElementById("map"), {
        center: new kakao.maps.LatLng(lat, lng),
        level: 3
      });

      if (pnu) drawParcel(pnu);

      kakao.maps.event.addListener(map, "click", function(e) {
        var clat = e.latLng.getLat();
        var clng = e.latLng.getLng();
        if (ov) ov.setMap(null);

        // нҒҙлҰӯн•  л•Ңл§ҲлӢӨ мғҲ div мғқм„ұ (onclickм—җ мўҢн‘ң м§Ғм ‘ л°”мқёл”©)
        var div = document.createElement("div");
        div.className = "kbtn";
        div.textContent = "рҹ“Ӣ кұҙм¶•л¬јлҢҖмһҘ мЎ°нҡҢ";
        div.onclick = function() {
          // Streamlit кіөмӢқ мұ„л„җлЎң мўҢн‘ң м „лӢ¬
          Streamlit.setComponentValue({ lat: clat, lng: clng });
        };

        ov = new kakao.maps.CustomOverlay({
          map: map,
          position: e.latLng,
          content: div,
          yAnchor: 1.0
        });
      });

      // iframe лҶ’мқҙ Streamlitм—җ м•ҢлҰј
      Streamlit.setFrameHeight(document.body.scrollHeight);
    });
  };
  document.head.appendChild(script);
}

// в”Җв”Җ Vworld м§Җм ҒкІҪкі„ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawParcel(pnu) {
  var s = document.createElement("script");
  s.src = "https://api.vworld.kr/req/data?service=data&request=GetFeature"
    + "&data=LP_PA_CBND_BU_GEOM&key=" + VWORLD_KEY
    + "&attrFilter=pnu:=" + pnu + "&crs=EPSG:4326&callback=vCb";
  document.body.appendChild(s);
}

window.vCb = function(d) {
  if (!d.response || d.response.status !== "OK") return;
  var f = d.response.result.featureCollection.features;
  if (!f || !f.length) return;
  var g = f[0].geometry.coordinates;
  while (Array.isArray(g[0][0])) g = g[0];
  var path = g.map(function(c) { return new kakao.maps.LatLng(c[1], c[0]); });
  new kakao.maps.Polygon({
    map: map, path: path,
    strokeWeight: 3, strokeColor: "#3396ff", strokeOpacity: 1,
    fillColor: "#3396ff", fillOpacity: 0.15
  });
};
</script>
</body>
</html>
